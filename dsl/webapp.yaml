# Web应用生命周期状态机模板
# 适用于Web服务类应用的生命周期管理

name: webapp-lifecycle
description: Web应用的标准生命周期状态机模板

# 资产类型定义
asset_types:
  - id: source-code
    name: 源代码
    description: Git仓库克隆的源代码
    schema:
      type: directory
      required: [path]
  
  - id: jar-file
    name: JAR文件
    description: Maven构建生成的JAR文件
    schema:
      type: file
      required: [path, version]
  
  - id: container
    name: 运行容器
    description: Terraform部署的Docker容器
    schema:
      type: container
      required: [containerId, image]

# 动作定义
actions:
  - id: git-clone
    name: Git Clone
    type: tool
    description: 从Git仓库克隆源代码
    command: git
    args:
      - clone
      - ${repository}
      - ${outputDir}
    parameters:
      repository: ""
      outputDir: ""
  
  - id: maven-build
    name: Maven Build
    type: tool
    description: 使用Maven构建项目
    command: mvn
    args:
      - clean
      - package
      - -DskipTests
    parameters:
      sourceDir: ""
  
  - id: terraform-deploy
    name: Terraform Deploy
    type: tool
    description: 使用Terraform部署到容器
    command: terraform
    args:
      - apply
      - -auto-approve
    parameters:
      jarPath: ""
      environment: ""

# 状态定义
states:
  - id: initial
    name: 初始状态
    description: 软件资产初始状态
    expected_asset_types: []
  
  - id: source-code
    name: 获取源代码
    description: 已从Git仓库获取源代码
    expected_asset_types:
      - source-code
  
  - id: build
    name: 构建
    description: 已构建生成JAR文件
    expected_asset_types:
      - jar-file
  
  - id: deployed
    name: 部署运行
    description: 已部署并运行
    expected_asset_types:
      - container

# 转换规则定义
transitions:
  - from: initial
    to: source-code
    action: git-clone
    conditions:
      repository: required
    input_asset_types: []
    generated_asset_types:
      - source-code
  
  - from: source-code
    to: build
    action: maven-build
    conditions: {}
    input_asset_types:
      - source-code
    generated_asset_types:
      - jar-file
  
  - from: build
    to: deployed
    action: terraform-deploy
    conditions: {}
    input_asset_types:
      - jar-file
    generated_asset_types:
      - container

