# 软件资产配置文件
# 定义该软件资产的基本信息和配置

id: petclinic-001
name: Spring PetClinic
description: Spring Framework 示例应用

# 使用的状态机模板（相对于项目根目录的路径）
state_machine_template: ../../dsl/webapp.yaml

# 工作目录配置
workspace:
  # 源代码存储路径（相对于workspace目录）
  source_dir: source
  # 构建产物存储路径
  build_dir: build
  # 部署配置存储路径
  deploy_dir: deploy
  # 其他资产存储路径
  assets_dir: assets

# 应用特定配置
application:
  # Git仓库配置
  git:
    repository: https://github.com/spring-projects/spring-petclinic.git
    branch: main
  
  # 构建配置
  build:
    tool: maven
    version: "3.8.0"
  
  # 部署配置
  deploy:
    tool: terraform
    environment: production
    container_image: spring-petclinic:latest

# 元数据
metadata:
  owner: admin
  team: platform
  created_at: "2024-01-01T00:00:00Z"

